services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "Türkmen Sözlük"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8080"
      APP_LOCALE: tk
      APP_FALLBACK_LOCALE: tk
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: turkmen_dictionary
      DB_USERNAME: turkmen
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    command: postgres -c max_locks_per_transaction=256
    environment:
      POSTGRES_DB: turkmen_dictionary
      POSTGRES_USER: turkmen
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
